    <script type="text/babel">
        const { useState, useEffect, useContext, createContext, useRef, useCallback, useMemo } = React;

        // ─── CONTEXT ────────────────────────────────────────────────────────────
        const AppContext = createContext();

        const defaultData = {
            // bump dataVersion when you change defaults to force clients to refresh cache
            dataVersion: 1,
            hero: {
                title: "Stylish-Tailor",
                subtitle: "Crafted with precision, tailored to perfection. Experience the art of custom clothing.",
                image: "assests/bespoke.png",
            },
            about: {
                title: "About Our Tailor Shop",
                content: "With over 20 years of experience, we specialize in every kind style/design in women wear. From wedding suits to everyday wear, every piece is crafted with attention to detail and the finest fabrics.",
                image: "assests/about.png",
            },
            services: [
                { id: 's1', title: "Bespoke Suits", description: "Custom-made suits tailored to your exact measurements and style preferences.", price: "16000+pkr", image: "assests/bespoke.png" },
                { id: 's2', title: "Wedding Dresses", description: "Elegant bridal gowns designed and stitched with the finest lace and silk.", price: "15000+pkr", image: "assests/wedding.png" },
                { id: 's3', title: "Shalwar Kameez", description: "Bring your unique style to life — tailored shalwar kameez as requested.", price: "2000+pkr", image: "assests/shalwarkamiz.png" },
                // { id: 's4', title: "Showcase", description: "More examples of our work and custom orders.", price: "See details", image: "assests/about.png" },
            ],
            gallery: [
                "https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=400&h=300&fit=crop",
                "https://images.unsplash.com/photo-1539008835657-9e8e9680c956?w=400&h=300&fit=crop",
                // "https://images.unsplash.com/photo-1562322140-8baeececf3df?w=400&h=300&fit=crop",
                "https://images.unsplash.com/photo-1589310243389-96a5483213a8?w=400&h=300&fit=crop",
                // "https://images.unsplash.com/photo-1593032465175-481c3ae4010e?w=400&h=300&fit=crop",
                "https://images.unsplash.com/photo-1539533113208-f6df8cc8b543?w=400&h=300&fit=crop",
            ],
            contact: {
                phone: "03096893531",
                email: "raheemsubhan92@gmail.com",
                address: "walton road 7 Street, Lahore, Pakistan",
                hours: "Mon-Sat: 9:00 AM - 10:00 PM"
            },
            whatsapp: "03096893531"
        };

        const db = window.firebaseModule?.db || null;

        const loadRemoteData = async () => {
            if (!db) return null;
            try {
                const docRef = window.firebaseModule.doc(db, 'tailorSite', 'data');
                const snapshot = await window.firebaseModule.getDoc(docRef);
                return snapshot.exists() ? snapshot.data() : null;
            } catch (err) {
                console.warn('Firebase load failed:', err);
                return null;
            }
        };

        const saveRemoteData = async (data) => {
            if (!db) return;
            try {
                const docRef = window.firebaseModule.doc(db, 'tailorSite', 'data');
                await window.firebaseModule.setDoc(docRef, data);
            } catch (err) {
                console.warn('Firebase save failed:', err);
            }
        };

        const listenRemoteData = (onData) => {
            if (!db) return () => { };
            const docRef = window.firebaseModule.doc(db, 'tailorSite', 'data');
            return window.firebaseModule.onSnapshot(docRef, (snapshot) => {
                if (snapshot.exists()) {
                    onData(snapshot.data());
                }
            }, (err) => {
                console.warn('Firestore listener failed:', err);
            });
        };

        function loadData() {
            try {
                const raw = localStorage.getItem('tailorData');
                if (raw) {
                    const parsed = JSON.parse(raw);
                    // If versions mismatch, replace cached data with new defaults and push defaults
                    if (!parsed.dataVersion || parsed.dataVersion !== defaultData.dataVersion) {
                        // overwrite local cache and return defaults so changes in code/assets take effect
                        try { localStorage.setItem('tailorData', JSON.stringify(defaultData)); } catch (e) { }
                        // also attempt to write to remote so other users see defaults (if allowed)
                        try { saveRemoteData(defaultData); } catch (e) { }
                        return defaultData;
                    }
                    return { ...defaultData, ...parsed };
                }
            } catch (_) { }
            return defaultData;
        }

        function saveData(data) {
            localStorage.setItem('tailorData', JSON.stringify(data));
            saveRemoteData(data);
        }

        function saveLocalData(data) {
            localStorage.setItem('tailorData', JSON.stringify(data));
        }

        function loadPassword() {
            return localStorage.getItem('tailorAdminPassword') || 'raheem@109';
        }

        function savePassword(password) {
            localStorage.setItem('tailorAdminPassword', password);
        }

        const AppProvider = ({ children }) => {
            const [data, setData] = useState(loadData);
            const [page, setPage] = useState('home');
            const [isAdmin, setIsAdmin] = useState(() => localStorage.getItem('tailorAdmin') === 'true');
            const [toast, setToast] = useState(null);
            const [adminPassword, setAdminPassword] = useState(loadPassword);
            const [isLoaded, setIsLoaded] = useState(false);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 2800);
            };

            useEffect(() => {
                if (isLoaded) return;

                let unsubscribe = () => { };
                const initRemote = async () => {
                    const remote = await loadRemoteData();
                    if (remote) {
                        setData(remote);
                        saveLocalData(remote);
                    }
                    unsubscribe = listenRemoteData((remoteData) => {
                        if (remoteData) {
                            setData(remoteData);
                            saveLocalData(remoteData);
                        }
                    });
                    setIsLoaded(true);
                };

                initRemote();
                return () => unsubscribe();
            }, [isLoaded]);

            const updateData = (newData) => {
                const merged = { ...data, ...newData };
                setData(merged);
                saveData(merged);
                showToast('✅ Changes saved successfully!');
            };

            const updateSection = (section, values) => {
                const merged = { ...data, [section]: { ...data[section], ...values } };
                setData(merged);
                saveData(merged);
                showToast('✅ Section updated!');
            };

            const addService = (service) => {
                const newService = { ...service, id: 's' + Date.now() };
                const merged = { ...data, services: [...data.services, newService] };
                setData(merged);
                saveData(merged);
                showToast('✅ Service added!');
            };

            const updateService = (id, updates) => {
                const merged = {
                    ...data,
                    services: data.services.map(s => s.id === id ? { ...s, ...updates } : s)
                };
                setData(merged);
                saveData(merged);
                showToast('✅ Service updated!');
            };

            const deleteService = (id) => {
                const merged = { ...data, services: data.services.filter(s => s.id !== id) };
                setData(merged);
                saveData(merged);
                showToast('🗑️ Service deleted.');
            };

            const addGallery = (url) => {
                const merged = { ...data, gallery: [...data.gallery, url] };
                setData(merged);
                saveData(merged);
                showToast('✅ Image added to gallery!');
            };

            const removeGallery = (index) => {
                const merged = { ...data, gallery: data.gallery.filter((_, i) => i !== index) };
                setData(merged);
                saveData(merged);
                showToast('🗑️ Image removed.');
            };

            const login = (pass) => {
                if (pass === adminPassword) {
                    setIsAdmin(true);
                    localStorage.setItem('tailorAdmin', 'true');
                    showToast('🔐 Welcome Admin!');
                    return true;
                }
                showToast('❌ Invalid password.');
                return false;
            };

            const changePassword = (current, next, confirm) => {
                if (current !== adminPassword) {
                    showToast('❌ Current password is incorrect.');
                    return false;
                }
                if (!next) {
                    showToast('❌ Enter a new password.');
                    return false;
                }
                if (next !== confirm) {
                    showToast('❌ New passwords do not match.');
                    return false;
                }
                setAdminPassword(next);
                savePassword(next);
                showToast('✅ Password changed successfully!');
                return true;
            };

            const logout = () => {
                setIsAdmin(false);
                localStorage.removeItem('tailorAdmin');
                showToast('👋 Logged out.');
            };

            const value = {
                data,
                page,
                setPage,
                isAdmin,
                toast,
                showToast,
                updateData,
                updateSection,
                addService,
                updateService,
                deleteService,
                addGallery,
                removeGallery,
                login,
                logout,
                changePassword,
                setData
            };

            return React.createElement(AppContext.Provider, { value }, children);
        };

        const useApp = () => useContext(AppContext);

        // ─── ICONS ──────────────────────────────────────────────────────────────
        const Icons = {

            Menu: () => React.createElement('svg', { viewBox: '0 0 24 24', width: 28, height: 28, fill: 'none', stroke: 'currentColor', strokeWidth: 2 },
                React.createElement('path', { d: 'M3 6h18M3 12h18M3 18h18' })
